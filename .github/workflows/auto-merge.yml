name: auto-merge

on:
  pull_request:
    types: [opened, labeled, synchronize]

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.pull_request.labels.*.name, 'agent-validated')
      && github.actor != 'github-actions[bot]'
    steps:
      - name: Skip if PR already merged or closed
        id: check
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          state=$(gh pr view ${{ github.event.pull_request.number }} \
            -R ${{ github.repository }} --json state -q .state)
          echo "state=$state" >> "$GITHUB_OUTPUT"
      - name: Enable auto-merge
        if: steps.check.outputs.state == 'OPEN'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --merge --auto --delete-branch \
            -R ${{ github.repository }}
